pipeline:
  name: postgres-to-parquet-localcopy-resume

source:
  type: postgres
  config:
    host: pg
    port: 5432
    dbname: lab
    user: lab
    password: lab
    query: "SELECT * FROM spacecraft_telemetry_events ORDER BY event_sequence"
    batch_size: 2000

destination:
  type: parquet
  config:
    prefix: events
    compression: snappy
    max_file_size: "512KiB"

sink:
  type: local-copy
  config:
    dest: /output
