case:
  name: postgres-to-parquet-single
  description: Reads 100k rows from PostgreSQL and writes them to a single Parquet file
  tags: [postgres, parquet, smoke]

services:
  - image: images/lab-postgres-15
    alias: pg
    readiness:
      tcp: 5432
      timeout_seconds: 300
      postgres:
        dbname: lab
        user: lab
        password: lab
        probe_query: "SELECT 1 FROM spacecraft_telemetry_events LIMIT 1"

pipeline:
  file: pipeline.yaml

# Parquet output is binary, which the lab's line-counting `output:` check can't
# validate. Only the run summary's row counts are asserted here; the deeper
# "is the single file actually correct?" check is done by the bundle's validate
# hook (parquet-destination), which opens the file with pyarrow.
expect:
  status: success
  rows_read: 100000
  rows_written: 100000
