case:
  name: mysql-to-mysql-staged-merge
  description: >
    Loads 100k rows into MySQL via staged_merge (INSERT into a staging table,
    then INSERT ... SELECT ... ON DUPLICATE KEY UPDATE by id). Exercises the
    idempotent upsert path against a real MySQL; asserts every row committed.
  tags: [mysql, destination, staged-merge, smoke]

services:
  - image: images/lab-mysql-8
    alias: mysql
    readiness:
      tcp: 3306
      timeout_seconds: 300
      mysql:
        dbname: lab
        user: lab
        password: lab
        probe_query: "SELECT 1 FROM spacecraft_telemetry_events LIMIT 1"

pipeline:
  file: pipeline.yaml

expect:
  status: success
  rows_read: 100000
  rows_written: 100000
