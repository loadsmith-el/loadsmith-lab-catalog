bundle:
  name: tls-spike
  description: >
    Validates the rustls + rustls-rustcrypto TLS stack against real database
    servers. Each case proves a handshake; more sources are added here as their
    plugins are built.

cases:
  - case: catalog/postgres-to-jsonl-tls-require
  - case: catalog/mysql-to-jsonl-tls-require
